<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pickleball Matcher</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'DM Mono', 'Courier New', monospace;
      background: #0a0e1a;
      min-height: 100vh;
      color: #e2e8f0;
      padding: 24px 16px;
      max-width: 900px;
      margin: 0 auto;
    }
    
    button, input {
      font-family: inherit;
    }

    /* Typography helpers */
    .section-title {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
      margin-top: 0;
    }

    /* Algorithm Grid */
    .algo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    .algo-btn {
      background: #111827;
      border: 2px solid #1e293b;
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      color: #e2e8f0;
    }
    .algo-btn .emoji {
      font-size: 18px;
      margin-bottom: 4px;
    }
    .algo-btn .name {
      font-weight: 700;
      font-size: 13px;
    }
    .algo-btn .desc {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    /* Player Chips */
    .players-container {
      margin-bottom: 24px;
    }
    .chips-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .player-chip {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .player-name {
      font-weight: 600;
    }
    .player-rating {
      color: #64748b;
      font-size: 11px;
    }
    .player-record {
      color: #00c896;
      font-size: 11px;
    }
    .remove-btn {
      background: none;
      border: none;
      color: #374151;
      cursor: pointer;
      padding: 0;
      font-size: 14px;
      line-height: 1;
    }
    .remove-btn:hover {
      color: #ef4444;
    }

    /* Add Player Controls */
    .add-player-row {
      display: flex;
      gap: 8px;
    }
    .input-name {
      flex: 1;
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 8px 12px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
    }
    .rating-selector-box {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 8px 12px;
    }
    .rating-label {
      font-size: 11px;
      color: #64748b;
    }
    .input-rating {
      width: 44px;
      background: none;
      border: none;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
    }
    .add-btn {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 16px;
      color: #e2e8f0;
      cursor: pointer;
      font-size: 13px;
      fontWeight: 600;
    }
    .add-btn:hover {
      background: #334155;
    }

    /* Main Match Action Button */
    .generate-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.5px;
      margin-bottom: 24px;
      transition: all 0.2s;
    }

    /* Matchups & Court Cards */
    .matchups-container {
      margin-bottom: 24px;
    }
    .empty-msg {
      text-align: center;
      color: #64748b;
      padding: 32px;
      font-size: 14px;
    }
    .courts-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .court-card {
      background: #111827;
      border-radius: 14px;
      padding: 16px;
      transition: border 0.3s;
    }
    .court-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .court-num {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .recorded-badge {
      font-size: 11px;
      color: #00c896;
      background: #00c89618;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .versus-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
    }
    .vs-text {
      color: #374151;
      font-weight: 800;
      font-size: 16px;
      text-align: center;
    }
    .team-block {
      border-radius: 10px;
      padding: 10px 12px;
      text-align: center;
    }
    .team-player {
      margin-bottom: 4px;
    }
    .team-player:last-child {
      margin-bottom: 0;
    }
    .team-player-name {
      font-weight: 700;
      font-size: 13px;
    }
    .team-player-stars {
      font-size: 11px;
    }
    .team-avg {
      font-size: 10px;
      color: #374151;
      margin-top: 4px;
    }
    .outcome-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .win-btn {
      flex: 1;
      padding: 7px;
      background: #0a0e1a;
      border: 1px solid #1e293b;
      border-radius: 8px;
      color: #94a3b8;
      cursor: pointer;
      font-size: 12px;
    }
    .win-btn:hover {
      border-color: #4b5563;
      color: #e2e8f0;
    }
    
    /* Bench / Sit outs */
    .bench-box {
      margin-top: 12px;
      padding: '10px 14px';
      background: #111827;
      border-radius: 10px;
      font-size: 13px;
      color: #64748b;
      padding: 10px 14px;
    }
    .next-round-btn {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      background: #111827;
      border: 2px dashed #1e293b;
      border-radius: 12px;
      color: #64748b;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .next-round-btn:hover {
      border-color: #334155;
      color: #94a3b8;
    }

    /* Leaderboard Container */
    .leaderboard-container {
      margin-bottom: 24px;
    }
    .leaderboard-card {
      background: #111827;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #1e293b;
    }
    .leaderboard-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid #1e293b;
    }
    .leaderboard-row:last-child {
      border-bottom: none;
    }
    .lb-rank {
      width: 20px;
      font-weight: 700;
      font-size: 13px;
    }
    .lb-name {
      flex: 1;
      font-weight: 600;
      font-size: 13px;
    }
    .lb-games {
      font-size: 11px;
      color: #64748b;
    }
    .lb-wins {
      font-size: 13px;
      color: #00c896;
      font-weight: 700;
    }
    .lb-pct {
      font-size: 11px;
      color: #374151;
    }

    /* Reset Section */
    .reset-btn {
      width: 100%;
      padding: 10px;
      background: none;
      border: 1px solid #1e293b;
      border-radius: 10px;
      color: #374151;
      cursor: pointer;
      font-size: 12px;
    }
    .reset-btn:hover {
      color: #64748b;
      border-color: #334155;
    }
  </style>
</head>
<body>

  <div style="text-align: center; margin-bottom: 32px;">
    <div style="font-size: 40px; margin-bottom: 8px;">🏓</div>
    <h1 style="
      font-size: 28px; font-weight: 800; margin: 0;
      background: linear-gradient(135deg, #00c896, #8b5cf6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    ">Pickleball Matcher</h1>
    <p id="session-stats" style="color: #64748b; font-size: 13px; margin: 6px 0 0;">
      Round 1 · 8 players · 2 courts
    </p>
  </div>

  <div>
    <p class="section-title">Matching Algorithm</p>
    <div class="algo-grid" id="algo-selectors-container"></div>
  </div>

  <div class="players-container">
    <p class="section-title" id="players-count-label">Players (8)</p>
    <div class="chips-wrapper" id="players-chips-wrapper"></div>
    
    <div class="add-player-row">
      <input type="text" id="new-player-name" placeholder="Player name" class="input-name" />
      <div class="rating-selector-box">
        <span class="rating-label">Rating</span>
        <input type="number" id="new-player-rating" min="1.0" max="5.5" step="0.5" value="3.5" class="input-rating" />
      </div>
      <button class="add-btn" id="add-player-submit">+ Add</button>
    </div>
  </div>

  <button class="generate-btn" id="generate-action-btn"></button>

  <div class="matchups-container" id="matchups-section" style="display: none;"></div>

  <div class="leaderboard-container" id="leaderboard-section" style="display: none;">
    <p class="section-title">Session Leaderboard</p>
    <div class="leaderboard-card" id="leaderboard-list"></div>
  </div>

  <button class="reset-btn" id="reset-session-btn">↺ Reset Session</button>

  <script>
    // System Constants Configuration Definitions
    const ALGORITHMS = [
      { id: "snake", name: "Snake Draft", emoji: "🔄", desc: "Skill-balanced teams via snake sorting", color: "#00c896" },
      { id: "weighted", name: "Weighted Random", emoji: "🎲", desc: "Random but favors similar skill levels", color: "#f59e0b" },
      { id: "dynamic", name: "Dynamic Ladder", emoji: "🏆", desc: "Re-matches based on live session performance", color: "#ef4444" },
      { id: "roundrobin", name: "Round Robin", emoji: "🎯", desc: "Random, no repeat partners, equal games", color: "#8b5cf6" }
    ];

    const SAMPLE_PLAYERS = [
      { id: 1, name: "Alex", rating: 4.5, gamesPlayed: 0, wins: 0, partners: [] },
      { id: 2, name: "Blake", rating: 3.5, gamesPlayed: 0, wins: 0, partners: [] },
      { id: 3, name: "Casey", rating: 4.0, gamesPlayed: 0, wins: 0, partners: [] },
      { id: 4, name: "Dana", rating: 3.0, gamesPlayed: 0, wins: 0, partners: [] },
      { id: 5, name: "Ellis", rating: 4.2, gamesPlayed: 0, wins: 0, partners: [] },
      { id: 6, name: "Fran", rating: 3.8, gamesPlayed: 0, wins: 0, partners: [] },
      { id: 7, name: "Gray", rating: 2.5, gamesPlayed: 0, wins: 0, partners: [] },
      { id: 8, name: "Harper", rating: 4.8, gamesPlayed: 0, wins: 0, partners: [] }
    ];

    // Stateful Variable Storage Setup
    let players = JSON.parse(JSON.stringify(SAMPLE_PLAYERS));
    let selectedAlgo = "snake";
    let matchups = [];
    let generated = false;
    let round = 1;
    let history = [];

    // Helper Utility Functions
    function ratingColor(r) {
      if (r >= 4.5) return "#00c896";
      if (r >= 3.5) return "#f59e0b";
      return "#ef4444";
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // Mathematical Team Combinatoric Stack Logic Generators
    function snakeMatch(playerList) {
      const sorted = [...playerList].sort((a, b) => b.rating - a.rating);
      const courts = [];
      let i = 0;
      while (i + 3 <= sorted.length) {
        courts.push({
          team1: [sorted[i], sorted[i + 3]],
          team2: [sorted[i + 1], sorted[i + 2]],
          winner: null
        });
        i += 4;
      }
      return courts;
    }

    function weightedMatch(playerList) {
      const shuffled = shuffle(playerList);
      const courts = [];
      let i = 0;
      while (i + 3 <= shuffled.length) {
        const group = [...shuffled.slice(i, i + 4)].sort((a, b) => b.rating - a.rating);
        courts.push({
          team1: [group[0], group[3]],
          team2: [group[1], group[2]],
          winner: null
        });
        i += 4;
      }
      return courts;
    }

    function dynamicMatch(playerList) {
      const sorted = [...playerList].sort((a, b) => {
        const aRate = a.gamesPlayed > 0 ? a.wins / a.gamesPlayed : a.rating / 10;
        const bRate = b.gamesPlayed > 0 ? b.wins / b.gamesPlayed : b.rating / 10;
        return bRate - aRate;
      });
      const courts = [];
      let i = 0;
      while (i + 3 <= sorted.length) {
        courts.push({
          team1: [sorted[i], sorted[i + 1]],
          team2: [sorted[i + 2], sorted[i + 3]],
          winner: null
        });
        i += 4;
      }
      return courts;
    }

    function roundRobinMatch(playerList) {
      const available = [...playerList].sort((a, b) => a.gamesPlayed - b.gamesPlayed);
      const courts = [];
      const used = new Set();

      const tryPair = (pool) => {
        for (let i = 0; i < pool.length; i++) {
          for (let j = i + 1; j < pool.length; j++) {
            const a = pool[i], b = pool[j];
            if (!used.has(a.id) && !used.has(b.id) && !a.partners.includes(b.id)) {
              return [a, b];
            }
          }
        }
        for (let i = 0; i < pool.length; i++) {
          for (let j = i + 1; j < pool.length; j++) {
            const a = pool[i], b = pool[j];
            if (!used.has(a.id) && !used.has(b.id)) return [a, b];
          }
        }
        return null;
      };

      let remaining = [...available];
      while (remaining.length >= 4) {
        const pair1 = tryPair(remaining);
        if (!pair1) break;
        used.add(pair1[0].id); used.add(pair1[1].id);
        remaining = remaining.filter(p => !used.has(p.id));
        
        const pair2 = tryPair(remaining);
        if (!pair2) { 
          used.delete(pair1[0].id); 
          used.delete(pair1[1].id); 
          break; 
        }
        used.add(pair2[0].id); used.add(pair2[1].id);
        remaining = remaining.filter(p => !used.has(p.id));
        
        courts.push({ team1: pair1, team2: pair2, winner: null });
      }
      return courts;
    }

    function generateMatchups(playerList, algo) {
      if (algo === "snake") return snakeMatch(playerList);
      if (algo === "weighted") return weightedMatch(playerList);
      if (algo === "dynamic") return dynamicMatch(playerList);
      if (algo === "roundrobin") return roundRobinMatch(playerList);
      return [];
    }

    // UI Orchestration State Rendering Engine
    function renderApp() {
      const currentAlgo = ALGORITHMS.find(a => a.id === selectedAlgo);

      // 1. Update Layout Meta Stats Headers
      document.getElementById("session-stats").textContent = `Round ${round} · ${players.length} players · ${Math.floor(players.length / 4)} courts`;
      document.getElementById("players-count-label").textContent = `Players (${players.length})`;

      // 2. Render Algorithm Matrix Selectors
      const algoContainer = document.getElementById("algo-selectors-container");
      algoContainer.innerHTML = "";
      ALGORITHMS.forEach(a => {
        const isSelected = a.id === selectedAlgo;
        const btn = document.createElement("button");
        btn.className = "algo-btn";
        btn.style.background = isSelected ? `${a.color}18` : "#111827";
        btn.style.border = `2px solid ${isSelected ? a.color : "#1e293b"}`;
        
        btn.innerHTML = `
          <div class="emoji">${a.emoji}</div>
          <div class="name" style="color: ${isSelected ? a.color : '#e2e8f0'}">${a.name}</div>
          <div class="desc">${a.desc}</div>
        `;
        
        btn.addEventListener("click", () => {
          selectedAlgo = a.id;
          generated = false;
          matchups = [];
          renderApp();
        });
        algoContainer.appendChild(btn);
      });

      // 3. Render Players chips
      const chipsWrapper = document.getElementById("players-chips-wrapper");
      chipsWrapper.innerHTML = "";
      players.forEach(p => {
        const chip = document.createElement("div");
        chip.className = "player-chip";
        
        let recordSpan = "";
        if (p.gamesPlayed > 0) {
          recordSpan = `<span class="player-record">${p.wins}W/${p.gamesPlayed - p.wins}L</span>`;
        }

        chip.innerHTML = `
          <span class="status-dot" style="background: ${ratingColor(p.rating)}"></span>
          <span class="player-name">${p.name}</span>
          <span class="player-rating">${p.rating.toFixed(1)}</span>
          ${recordSpan}
          <button class="remove-btn">×</button>
        `;

        chip.querySelector(".remove-btn").addEventListener("click", () => {
          players = players.filter(pl => pl.id !== p.id);
          renderApp();
        });

        chipsWrapper.appendChild(chip);
      });

      // 4. Update Primary Trigger Control Action Button
      const actionBtn = document.getElementById("generate-action-btn");
      actionBtn.style.background = `linear-gradient(135deg, ${currentAlgo.color}, ${currentAlgo.color}99)`;
      actionBtn.style.boxShadow = `0 4px 24px ${currentAlgo.color}44`;
      actionBtn.innerHTML = `${currentAlgo.emoji} Generate ${currentAlgo.name} Matchups`;

      // 5. Render Active Matchups Courts Blocks
      const matchupsSection = document.getElementById("matchups-section");
      if (generated) {
        matchupsSection.style.display = "block";
        if (matchups.length === 0) {
          matchupsSection.innerHTML = `<div class="empty-msg">Need at least 4 players to generate matchups.</div>`;
        } else {
          matchupsSection.innerHTML = `
            <p class="section-title">Round ${round} Matchups</p>
            <div class="courts-list" id="courts-inner-list"></div>
          `;
          
          const courtsInnerList = document.getElementById("courts-inner-list");
          matchups.forEach((court, idx) => {
            const courtCard = document.createElement("div");
            courtCard.className = "court-card";
            courtCard.style.border = `1px solid ${court.winner ? currentAlgo.color + "44" : "#1e293b"}`;

            const avgRating = (team) => (team.reduce((s, p) => s + p.rating, 0) / team.length).toFixed(1);

            let headerBadge = court.winner ? `<span class="recorded-badge">✓ Recorded</span>` : "";
            
            courtCard.innerHTML = `
              <div class="court-header">
                <span class="court-num" style="color: ${currentAlgo.color}">COURT ${idx + 1}</span>
                ${headerBadge}
              </div>
              <div class="versus-row">
                <div class="team-block" style="background: ${court.winner === 'team1' ? currentAlgo.color + '12' : '#0a0e1a'}; border: 1px solid ${court.winner === 'team1' ? currentAlgo.color + '44' : '#1e293b'}">
                  ${court.team1.map(p => `
                    <div class="team-player">
                      <div class="team-player-name">${p.name}</div>
                      <div class="team-player-stars" style="color: ${ratingColor(p.rating)}">${p.rating.toFixed(1)} ⭐</div>
                    </div>
                  `).join('')}
                  <div class="team-avg">avg ${avgRating(court.team1)}</div>
                </div>
                <span class="vs-text">VS</span>
                <div class="team-block" style="background: ${court.winner === 'team2' ? currentAlgo.color + '12' : '#0a0e1a'}; border: 1px solid ${court.winner === 'team2' ? currentAlgo.color + '44' : '#1e293b'}">
                  ${court.team2.map(p => `
                    <div class="team-player">
                      <div class="team-player-name">${p.name}</div>
                      <div class="team-player-stars" style="color: ${ratingColor(p.rating)}">${p.rating.toFixed(1)} ⭐</div>
                    </div>
                  `).join('')}
                  <div class="team-avg">avg ${avgRating(court.team2)}</div>
                </div>
              </div>
              ${!court.winner ? `
                <div class="outcome-row">
                  <button class="win-btn" data-winner="team1">Team 1 Won</button>
                  <button class="win-btn" data-winner="team2">Team 2 Won</button>
                </div>
              ` : ''}
            `;

            if (!court.winner) {
              courtCard.querySelectorAll(".win-btn").forEach(b => {
                b.addEventListener("click", () => {
                  const winnerSide = b.getAttribute("data-winner");
                  confirmCourtResults(idx, winnerSide);
                });
              });
            }

            courtsInnerList.appendChild(courtCard);
          });

          // Compute sitting out sub footer elements
          const assignedPlayerIds = new Set(matchups.flatMap(c => [...c.team1, ...c.team2]).map(m => m.id));
          const sittingOut = players.filter(p => !assignedPlayerIds.has(p.id));
          
          if (sittingOut.length > 0) {
            const bench = document.createElement("div");
            bench.className = "bench-box";
            bench.innerHTML = `🪑 Sitting out: <strong>${sittingOut.map(p => p.name).join(", ")}</strong>`;
            matchupsSection.appendChild(bench);
          }

          // Add Round Progression Controller
          const nextBtn = document.createElement("button");
          nextBtn.className = "next-round-btn";
          nextBtn.textContent = "→ Next Round";
          nextBtn.addEventListener("click", () => {
            round += 1;
            matchups = [];
            generated = false;
            renderApp();
          });
          matchupsSection.appendChild(nextBtn);
        }
      } else {
        matchupsSection.style.display = "none";
      }

      // 6. Session Standings Live Board Loader Updates
      const leaderboardSection = document.getElementById("leaderboard-section");
      const hasPlayed = players.some(p => p.gamesPlayed > 0);
      if (hasPlayed) {
        leaderboardSection.style.display = "block";
        const lbList = document.getElementById("leaderboard-list");
        lbList.innerHTML = "";
        
        const sortedLeaderboard = [...players].sort((a, b) => b.wins - a.wins || b.gamesPlayed - a.gamesPlayed);
        sortedLeaderboard.forEach((p, index) => {
          const row = document.createElement("div");
          row.className = "leaderboard-row";
          const pct = p.gamesPlayed > 0 ? Math.round((p.wins / p.gamesPlayed) * 100) + "%" : "-";
          
          row.innerHTML = `
            <span class="lb-rank" style="color: ${index === 0 ? '#f59e0b' : '#374151'}">${index === 0 ? '🥇' : index + 1}</span>
            <span class="lb-name">${p.name}</span>
            <span class="lb-games">${p.gamesPlayed}G</span>
            <span class="lb-wins">${p.wins}W</span>
            <span class="lb-pct">${pct}</span>
          `;
          lbList.appendChild(row);
        });
      } else {
        leaderboardSection.style.display = "none";
      }
    }

    // Controller Event Action Ingestion Hook Handlers
    function confirmCourtResults(courtIdx, winnerSide) {
      const court = matchups[courtIdx];
      if (!court) return;

      court.winner = winnerSide;

      players = players.map(p => {
        const inTeam1 = court.team1.some(m => m.id === p.id);
        const inTeam2 = court.team2.some(m => m.id === p.id);
        if (!inTeam1 && !inTeam2) return p;

        const won = (winnerSide === "team1" && inTeam1) || (winnerSide === "team2" && inTeam2);
        const partner = inTeam1 ? court.team1.find(m => m.id !== p.id) : court.team2.find(m => m.id !== p.id);

        return {
          ...p,
          gamesPlayed: p.gamesPlayed + 1,
          wins: p.wins + (won ? 1 : 0),
          partners: partner ? [...new Set([...p.partners, partner.id])] : p.partners
        };
      });

      history.push({ round, court: courtIdx + 1, winner: winnerSide });
      renderApp();
    }

    document.getElementById("generate-action-btn").addEventListener("click", () => {
      matchups = generateMatchups(players, selectedAlgo);
      generated = true;
      renderApp();
    });

    function createNewPlayer() {
      const nameInput = document.getElementById("new-player-name");
      const ratingInput = document.getElementById("new-player-rating");
      const name = nameInput.value.trim();
      const rating = parseFloat(ratingInput.value);

      if (!name) return;

      players.push({
        id: Date.now(),
        name: name,
        rating: isNaN(rating) ? 3.5 : rating,
        gamesPlayed: 0,
        wins: 0,
        partners: []
      });

      nameInput.value = "";
      renderApp();
    }

    document.getElementById("add-player-submit").addEventListener("click", createNewPlayer);
    document.getElementById("new-player-name").addEventListener("keydown", (e) => {
      if (e.key === "Enter") createNewPlayer();
    });

    document.getElementById("reset-session-btn").addEventListener("click", () => {
      players = JSON.parse(JSON.stringify(SAMPLE_PLAYERS));
      matchups = [];
      generated = false;
      round = 1;
      history = [];
      renderApp();
    });

    // Initialize View Layer execution loop trigger
    renderApp();
  </script>
</body>
</html>
